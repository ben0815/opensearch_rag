[alembic]
# Pfad zum Migrations-Verzeichnis (relativ zu diesem File)
script_location = alembic

# Dateiname-Muster für neue Migrations: YYYYMMDD_<rev>_<slug>.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone für die Dateinamen
timezone = utc

# Die tatsächliche URL wird in env.py aus der Umgebungsvariable DATABASE_URL gelesen.
# Dieser Wert ist nur ein Platzhalter für den Offline-Modus (alembic upgrade --sql).
sqlalchemy.url = postgresql+asyncpg://raguser:changeme@localhost:5432/ragdb

[post_write_hooks]
# Automatische Code-Formatierung nach Migrations-Erstellung (optional)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
