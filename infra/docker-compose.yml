  app:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        - DEBIAN_FRONTEND=noninteractive
        - PIP_NO_CACHE_DIR=1
    container_name: app
    ports:
      - "${APP_BIND_HOST:-0.0.0.0}:8081:8081"
    environment:
      # Service connections
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - EMBEDDINGS_MODEL=${EMBEDDINGS_MODEL:-bge-m3}
      - LLM_MODEL=${LLM_MODEL:-qwen3.5:35b}
      - OPENSEARCH_URL=${OPENSEARCH_URL:-https://opensearch:9200}
      - OPENSEARCH_USERNAME=${OPENSEARCH_USERNAME:-admin}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:-admin}
      - OPENSEARCH_INDEX_NAME=${OPENSEARCH_INDEX_NAME:-documents}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      # Processing settings
      - EMBEDDING_SIZE=${EMBEDDING_SIZE:-1024}
      - CHUNK_SIZE=${CHUNK_SIZE:-400}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-60}
      - EMBEDDING_MAX_TOKENS=${EMBEDDING_MAX_TOKENS:-600}
      - TOKENIZER_MODEL_ID=${TOKENIZER_MODEL_ID:-BAAI/bge-m3}
      - OPENSEARCH_ANALYZER=${OPENSEARCH_ANALYZER:-standard}
      # Hybrid search settings
      - HYBRID_SEARCH_PIPELINE_NAME=${HYBRID_SEARCH_PIPELINE_NAME:-hybrid-rag-pipeline}
      - HYBRID_BM25_WEIGHT=${HYBRID_BM25_WEIGHT:-0.4}
      - HYBRID_KNN_WEIGHT=${HYBRID_KNN_WEIGHT:-0.6}
      - HYBRID_K=${HYBRID_K:-10}
      - HYBRID_SCORE_THRESHOLD=${HYBRID_SCORE_THRESHOLD:-0.1}
      # Auth / DB
      - DATABASE_URL=postgresql+asyncpg://raguser:${POSTGRES_PASSWORD:-changeme}@postgres:5432/ragdb
      - SESSION_LIFETIME_HOURS=${SESSION_LIFETIME_HOURS:-8}
      - LDAP_ENABLED=${LDAP_ENABLED:-false}
      - LDAP_URL=${LDAP_URL:-ldap://ldap:389}
      - LDAP_BASE_DN=${LDAP_BASE_DN:-dc=example,dc=com}
      - LDAP_USER_SEARCH_BASE=${LDAP_USER_SEARCH_BASE:-ou=users,dc=example,dc=com}
      - LDAP_BIND_DN=${LDAP_BIND_DN:-}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD:-}
      - LDAP_USER_FILTER=${LDAP_USER_FILTER:-(objectClass=inetOrgPerson)}
      - LDAP_UID_ATTR=${LDAP_UID_ATTR:-uid}
      - LDAP_DISPLAY_NAME_ATTR=${LDAP_DISPLAY_NAME_ATTR:-displayName}
      - LDAP_MAIL_ATTR=${LDAP_MAIL_ATTR:-mail}
      - LDAP_ADMIN_GROUP_DN=${LDAP_ADMIN_GROUP_DN:-}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.0}
      - LLM_NUM_CTX=${LLM_NUM_CTX:-16384}
      # Timeout für LLM-Antwort in Sekunden — bei großen Modellen ggf. erhöhen.
      # Das Frontend (chat.js) wartet LLM_TIMEOUT_SECONDS + 30s — beide müssen konsistent sein.
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-240}
      - SECURE_COOKIES=${SECURE_COOKIES:-false}
      # CSRF — APP_SECRET_KEY ist Pflicht; Generieren: python -c "import secrets; print(secrets.token_hex(32))"
      - APP_SECRET_KEY=${APP_SECRET_KEY}
      - CSRF_ENFORCE=${CSRF_ENFORCE:-true}
      # Debug settings
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      opensearch-network:
        aliases:
          - app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      opensearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
#      ollama:
#        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    command: >
      sh -c "redis-server /usr/local/etc/redis/redis.conf
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    environment:
      - REDIS_MAXMEMORY=512mb
      - REDIS_MAXMEMORY_POLICY=allkeys-lru
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      opensearch-network:
        aliases:
          - redis
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    profiles: [caddy]
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - opensearch-network
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # init.sql wird nicht mehr benötigt — das Schema wird von Alembic beim App-Start verwaltet.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - opensearch-network
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  opensearch-data:
    driver: local
  postgres_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  opensearch-network:
    driver: bridge
